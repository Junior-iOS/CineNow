name: CineNow
options:
  bundleIdPrefix: com.njdevelopment
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 5.9

targets:
  CineNow:
    type: application
    platform: iOS
    sources:
      - path: CineNow/Sources
    resources:
      - path: CineNow/Resources
      - path: CineNow/Colors
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.njdevelopment.CineNow
    info:
      path: Sources/App/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true